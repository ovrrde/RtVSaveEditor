name: Release

# Two ways to cut a release:
#   1. Push a tag like `v0.1.0`.
#   2. Actions tab -> Release -> "Run workflow", type a version (e.g. v0.1.0).
# Both build the Windows binary and publish a GitHub Release with the .exe attached.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as a pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p rtv_save_editor

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/rtv-save-editor.exe dist/
          Copy-Item README.md dist/
          Compress-Archive -Path dist/* -DestinationPath rtv-save-editor-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtv-save-editor-windows
          path: rtv-save-editor-windows.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          # Manual run: use the typed version (creates the tag). Tag push: use the pushed tag.
          tag_name: ${{ inputs.version || github.ref_name }}
          prerelease: ${{ inputs.prerelease || false }}
          files: |
            target/release/rtv-save-editor.exe
            rtv-save-editor-windows.zip
          generate_release_notes: true
