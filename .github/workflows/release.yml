name: Release

# Builds the Windows binary. Push a tag like `v0.1.0` to publish a GitHub
# Release with the .exe attached, or run manually to just get a build artifact.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p rtv_save_editor

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/rtv-save-editor.exe dist/
          Copy-Item README.md dist/
          Compress-Archive -Path dist/* -DestinationPath rtv-save-editor-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtv-save-editor-windows
          path: rtv-save-editor-windows.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/rtv-save-editor.exe
            rtv-save-editor-windows.zip
          generate_release_notes: true
